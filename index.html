<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Meta Energy | 자율형 에너지 인프라의 미래</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #050B14;
    --accent: #00E5FF;
    --glass: rgba(255, 255, 255, 0.05);
    --border: rgba(255, 255, 255, 0.1);
  }

  body {
    background: var(--primary);
    color: #fff;
    font-family: 'Pretendard', sans-serif;
    margin: 0;
    line-height: 1.6;
  }

  /* 글래스모피즘 컨테이너 */
  .glass-card {
    background: var(--glass);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    transition: transform 0.3s ease;
  }

  .glass-card:hover {
    transform: translateY(-10px);
    border-color: var(--accent);
  }

  /* 숫자 데이터 강조 */
  .metric-value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 3rem;
    color: var(--accent);
    font-weight: 700;
  }

  /* 섹션 애니메이션 */
  .reveal {
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.8s ease-out;
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  h1, h2 {
    font-family: 'Space Grotesk', sans-serif;
    letter-spacing: -0.02em;
  }
</style>
</head>
<body>

<section style="padding: 100px 20px; text-align: center;">
  <h1 style="font-size: 4rem;">Autonomous Energy OS</h1>
  <p style="color: #94a3b8; font-size: 1.25rem;">에너지 데이터의 흐름을 지능형 자율 체계로 연결합니다.</p>
</section>

<section class="reveal" style="max-width: 1000px; margin: 0 auto; padding: 20px;">
  <div class="glass-card">
    <h2>핵심 성과 지표</h2>
    <div style="display: flex; justify-content: space-around; margin-top: 30px;">
      <div>
        <div class="metric-value">1.96M+</div>
        <div>실증 처리 건수</div>
      </div>
      <div>
        <div class="metric-value">1,350억</div>
        <div>플랫폼 가치</div>
      </div>
    </div>
  </div>
</section>

<script>
  // 스크롤 감지 및 애니메이션 실행
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add('visible');
    });
  });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>

</body>
</html>
